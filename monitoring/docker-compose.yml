# HeLLMind metrics stack: push eval/train metrics → Pushgateway → Prometheus → Grafana.
#
#   cd monitoring && docker compose up -d
#   then eval with:  PROMETHEUS_GATEWAY=localhost:9091 python -m rl.eval ...
#   Grafana:     http://localhost:3000   (anonymous admin — the HeLLMind dashboard is provisioned)
#   Prometheus:  http://localhost:9090
#   Pushgateway: http://localhost:9091
services:
  pushgateway:
    image: prom/pushgateway:latest
    ports: ["9091:9091"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    depends_on: [pushgateway]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    depends_on: [prometheus]

volumes:
  grafana-data:
