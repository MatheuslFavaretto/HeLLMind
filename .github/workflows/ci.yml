name: CI

on:
  push:                     # every branch — feature work spends weeks off main and
                            # was getting zero CI signal (16 untested commits observed)
  pull_request:
  workflow_dispatch:        # allow manual runs from any branch

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ViZDoom needs a few system libs to import its wheel on Linux.
      - name: System deps (ViZDoom)
        run: sudo apt-get update && sudo apt-get install -y libsdl2-2.0-0 libopenal1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy   # headless ViZDoom (no display on the CI runner)
          SDL_AUDIODRIVER: dummy
        run: python -m pytest -q
